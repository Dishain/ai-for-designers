<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дякую! — AI for Designers</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0f;
      --accent: #6ee7b7;
      --accent-dim: rgba(110, 231, 183, 0.15);
      --text-primary: #f0f0f5;
      --text-secondary: rgba(240, 240, 245, 0.65);
      --border-accent: rgba(110, 231, 183, 0.25);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    a { text-decoration: none; color: inherit; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text-primary);
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      animation: fadeIn 0.6s ease-out;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    p {
      font-size: 1.125rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--bg-deep);
      background: var(--accent);
      padding: 16px 32px;
      border-radius: 8px;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(110, 231, 183, 0.25);
    }
    .btn svg { width: 18px; height: 18px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#127881;</div>
    <h1>Дякую! Ви у списку.</h1>
    <p>Я напишу вам, як тільки практикум буде готовий. Перші 50 учасників отримають early bird ціну $39.</p>
    <a href="index.html" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      На головну
    </a>
  </div>
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "68e22b3c35984ec9853ca3cff6c3bd9b"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
